<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Gastronómico</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#f4f6f9;
      padding:20px;
      color:#333;
    }

    .container{
      display:grid;
      grid-template-columns:250px 1fr;
      gap:20px;
    }

    .sidebar{
      background:white;
      border-radius:20px;
      padding:20px;
      height:calc(100vh - 40px);
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }

    .sidebar h2{
      margin-bottom:25px;
      color:#4b6cb7;
    }

    .menu-item{
      padding:12px;
      border-radius:10px;
      margin-bottom:10px;
      cursor:pointer;
      transition:.2s;
    }

    .menu-item:hover{
      background:#eef3ff;
    }

    .menu-item.active{
      background:#dfe9ff;
      color:#2952cc;
      font-weight:bold;
    }

    .content{
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
    }

    .filter-box{
      background:white;
      padding:15px;
      border-radius:15px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
      display:flex;
      gap:10px;
      align-items:center;
    }

    select{
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button{
      padding:10px 15px;
      border:none;
      border-radius:8px;
      background:#2952cc;
      color:white;
      cursor:pointer;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:15px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:20px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }

    .card h4{
      color:#777;
      margin-bottom:10px;
      font-size:14px;
    }

    .card .value{
      font-size:32px;
      font-weight:bold;
      color:#2952cc;
    }

    .charts{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:20px;
    }

    .chart-box{
      background:white;
      padding:20px;
      border-radius:20px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }

    .table-box{
      background:white;
      padding:20px;
      border-radius:20px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:15px;
    }

    table th{
      background:#f1f4f9;
      padding:12px;
      text-align:left;
    }

    table td{
      padding:10px;
      border-bottom:1px solid #eee;
    }

    .photos-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
      gap:15px;
      margin-top:20px;
    }

    .photo-card{
      background:white;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }

    .photo-card img{
      width:100%;
      height:120px;
      object-fit:cover;
      display:block;
    }

    .photo-card p{
      padding:10px;
      font-size:12px;
    }

    .loading{
      text-align:center;
      padding:50px;
      font-size:18px;
      color:#666;
    }

    @media(max-width:1200px){
      .cards{
        grid-template-columns:repeat(2,1fr);
      }

      .charts{
        grid-template-columns:1fr;
      }
    }

    @media(max-width:768px){
      .container{
        grid-template-columns:1fr;
      }

      .cards{
        grid-template-columns:1fr;
      }
    }

  </style>
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2>Dashboard</h2>

    <div class="menu-item active">Resumen</div>
    <div class="menu-item">Detalle</div>
    <div class="menu-item">Fotos</div>
    <div class="menu-item">Competencia</div>
  </div>

  <div class="content">

    <div class="top-bar">

      <div class="filter-box">
        <label>Ciudad:</label>

        <select id="cityFilter">
          <option value="TODOS">Todas</option>
        </select>

        <button onclick="resetFilters()">
          Limpiar
        </button>
      </div>

    </div>

    <div class="cards">

      <div class="card">
        <h4>Total Locales Relevados</h4>
        <div class="value" id="totalLocales">0</div>
      </div>

      <div class="card">
        <h4>Con Material BF</h4>
        <div class="value" id="materialBF">0%</div>
      </div>

      <div class="card">
        <h4>Con Material Competencia</h4>
        <div class="value" id="materialComp">0%</div>
      </div>

      <div class="card">
        <h4>Conocen Promo</h4>
        <div class="value" id="conocenPromo">0%</div>
      </div>

    </div>

    <div class="charts">

      <div class="chart-box">
        <canvas id="bfChart"></canvas>
      </div>

      <div class="chart-box">
        <canvas id="promoChart"></canvas>
      </div>

      <div class="chart-box">
        <canvas id="estadoChart"></canvas>
      </div>

      <div class="chart-box">
        <canvas id="compChart"></canvas>
      </div>

    </div>

    <div class="table-box">

      <h3>Locales Relevados</h3>

      <table>
        <thead>
        <tr>
          <th>Fecha</th>
          <th>Local</th>
          <th>Ciudad</th>
          <th>Material BF</th>
          <th>Conoce Promo</th>
        </tr>
        </thead>

        <tbody id="tableBody"></tbody>

      </table>

    </div>

    <div class="table-box">

      <h3>Fotos</h3>

      <div class="photos-grid" id="photosGrid"></div>

    </div>

  </div>

</div>

<script>

  // ==========================
  // CONFIG
  // ==========================

  const SHEET_ID = '2PACX-1vR1Y4H9iM_EqiFOBOEU2SRERaH0KfH3dTfdy0DsFTBhBkWeaaaqlmCFwqip1gy010JR9iQn9TZzM06V';

  const BF_URL =
    `https://opensheet.elk.sh/${SHEET_ID}/RE_BF_GASTRO_INT`;

  const COMP_URL =
    `https://opensheet.elk.sh/${SHEET_ID}/RE_COMPE_GASTRO_INT`;

  let bfData = [];
  let compData = [];

  let bfChart;
  let promoChart;
  let estadoChart;
  let compChart;

  // ==========================
  // INIT
  // ==========================

  async function init(){

    try{

      showLoading();

      const [bfRes, compRes] = await Promise.all([
        fetch(BF_URL),
        fetch(COMP_URL)
      ]);

      const bfJson = await bfRes.json();
      const compJson = await compRes.json();

      bfData = getUniqueByLocal(
        mapBFData(bfJson)
      );

      compData = getUniqueByLocal(
        mapCompData(compJson)
      );

      populateCities();

      renderDashboard();

    }catch(error){

      console.error(error);

      alert('Error cargando datos');

    }

  }

  // ==========================
  // MAPPERS
  // ==========================

  function mapBFData(data){

    return data.map(row => ({
      fecha: row["FECHA"] || "",
      local: row["LOCAL"] || "",
      ciudad: row["CIUDAD"] || "",
      hayMaterial: normalize(row["HAY_MATERIAL_DESIGNADO"]),
      materiales: row["MATERIALES_COLOCADOS"] || "",
      estadoMaterial: row["MATERIAL_CORRESPONDE_TIPO"] || "SIN DATO",
      conocePromo: normalize(row["ENCARGADO_CONOCE_PROMO"]),
      observaciones: row["OBSERVACIONES"] || "",

      fotos:[
        row["FOTO_MATERIAL_1"],
        row["FOTO_MATERIAL_2"],
        row["FOTO_MATERIAL_3"],
        row["FOTO_AUSENCIA"],
        row["FOTO_ANTERIOR_1"]
      ].filter(Boolean)

    }));

  }

  function mapCompData(data){

    return data.map(row => ({
      fecha: row["FECHA"] || "",
      local: row["LOCAL"] || "",
      ciudad: row["CIUDAD"] || "",
      hayCompetencia: normalize(row["HAY_MATERIAL_COMPETENCIA"]),
      marcas: row["MARCAS_IDENTIFICADAS"] || "",

      fotos:[
        row["FOTO_1"],
        row["FOTO_2"],
        row["FOTO_3"]
      ].filter(Boolean)

    }));

  }

  // ==========================
  // DEDUPLICATION
  // ==========================

  function getUniqueByLocal(data){

    const seen = new Set();

    return data.filter(item => {

      const local = item.local?.trim().toUpperCase();

      if(!local) return false;

      if(seen.has(local)){
        return false;
      }

      seen.add(local);

      return true;

    });

  }

  // ==========================
  // HELPERS
  // ==========================

  function normalize(value){

    return String(value || "")
      .trim()
      .toUpperCase();

  }

  function percent(part,total){

    if(total === 0) return 0;

    return Math.round((part / total) * 100);

  }

  function convertDriveUrl(url){

    if(!url) return '';

    if(url.includes('id=')){

      const id = url.split('id=')[1].split('&')[0];

      return `https://drive.google.com/thumbnail?id=${id}`;

    }

    const match = url.match(/\/d\/(.*?)\//);

    if(match && match[1]){

      return `https://drive.google.com/thumbnail?id=${match[1]}`;

    }

    return url;

  }

  function showLoading(){

    document.body.innerHTML =
      `<div class="loading">Cargando dashboard...</div>`;

  }

  function resetFilters(){

    document.getElementById('cityFilter').value = 'TODOS';

    renderDashboard();

  }

  // ==========================
  // FILTERS
  // ==========================

  function populateCities(){

    const cities = [
      ...new Set(
        bfData.map(i => i.ciudad).filter(Boolean)
      )
    ];

    const select =
      document.getElementById('cityFilter');

    cities.sort().forEach(city => {

      const option = document.createElement('option');

      option.value = city;
      option.textContent = city;

      select.appendChild(option);

    });

    select.addEventListener('change', renderDashboard);

  }

  function getFilteredData(){

    const city =
      document.getElementById('cityFilter').value;

    let filteredBF = [...bfData];
    let filteredComp = [...compData];

    if(city !== 'TODOS'){

      filteredBF =
        filteredBF.filter(i => i.ciudad === city);

      filteredComp =
        filteredComp.filter(i => i.ciudad === city);

    }

    return {
      filteredBF,
      filteredComp
    };

  }

  // ==========================
  // RENDER
  // ==========================

  function renderDashboard(){

    const {
      filteredBF,
      filteredComp
    } = getFilteredData();

    renderKPIs(filteredBF, filteredComp);

    renderCharts(filteredBF, filteredComp);

    renderTable(filteredBF);

    renderPhotos(filteredBF);

  }

  // ==========================
  // KPIS
  // ==========================

  function renderKPIs(bf, comp){

    const totalLocales = bf.length;

    const materialBF =
      bf.filter(i => i.hayMaterial === 'SI').length;

    const conocenPromo =
      bf.filter(i => i.conocePromo === 'SI').length;

    const materialComp =
      comp.filter(i => i.hayCompetencia === 'SI').length;

    document.getElementById('totalLocales')
      .textContent = totalLocales;

    document.getElementById('materialBF')
      .textContent =
      percent(materialBF,totalLocales) + '%';

    document.getElementById('conocenPromo')
      .textContent =
      percent(conocenPromo,totalLocales) + '%';

    document.getElementById('materialComp')
      .textContent =
      percent(materialComp,comp.length) + '%';

  }

  // ==========================
  // CHARTS
  // ==========================

  function renderCharts(bf, comp){

    if(bfChart) bfChart.destroy();
    if(promoChart) promoChart.destroy();
    if(estadoChart) estadoChart.destroy();
    if(compChart) compChart.destroy();

    // BF

    const bfYes =
      bf.filter(i => i.hayMaterial === 'SI').length;

    const bfNo = bf.length - bfYes;

    bfChart = new Chart(
      document.getElementById('bfChart'),
      {
        type:'doughnut',
        data:{
          labels:['SI','NO'],
          datasets:[{
            data:[bfYes,bfNo]
          }]
        }
      }
    );

    // PROMO

    const promoYes =
      bf.filter(i => i.conocePromo === 'SI').length;

    const promoNo =
      bf.length - promoYes;

    promoChart = new Chart(
      document.getElementById('promoChart'),
      {
        type:'pie',
        data:{
          labels:['SI','NO'],
          datasets:[{
            data:[promoYes,promoNo]
          }]
        }
      }
    );

    // ESTADO

    const estadoMap = {};

    bf.forEach(item => {

      const estado =
        item.estadoMaterial || 'SIN DATO';

      estadoMap[estado] =
        (estadoMap[estado] || 0) + 1;

    });

    estadoChart = new Chart(
      document.getElementById('estadoChart'),
      {
        type:'bar',
        data:{
          labels:Object.keys(estadoMap),
          datasets:[{
            label:'Cantidad',
            data:Object.values(estadoMap)
          }]
        }
      }
    );

    // COMPETENCIA

    const compYes =
      comp.filter(i =>
        i.hayCompetencia === 'SI'
      ).length;

    const compNo =
      comp.length - compYes;

    compChart = new Chart(
      document.getElementById('compChart'),
      {
        type:'doughnut',
        data:{
          labels:['SI','NO'],
          datasets:[{
            data:[compYes,compNo]
          }]
        }
      }
    );

  }

  // ==========================
  // TABLE
  // ==========================

  function renderTable(data){

    const tbody =
      document.getElementById('tableBody');

    tbody.innerHTML = '';

    data.forEach(item => {

      const tr = document.createElement('tr');

      tr.innerHTML = `
        <td>${item.fecha}</td>
        <td>${item.local}</td>
        <td>${item.ciudad}</td>
        <td>${item.hayMaterial}</td>
        <td>${item.conocePromo}</td>
      `;

      tbody.appendChild(tr);

    });

  }

  // ==========================
  // PHOTOS
  // ==========================

  function renderPhotos(data){

    const grid =
      document.getElementById('photosGrid');

    grid.innerHTML = '';

    data.forEach(item => {

      item.fotos.forEach(photo => {

        const imgUrl =
          convertDriveUrl(photo);

        const card =
          document.createElement('div');

        card.className = 'photo-card';

        card.innerHTML = `
          <a href="${photo}" target="_blank">
            <img
              loading="lazy"
              src="${imgUrl}"
              onerror="this.src='https://via.placeholder.com/150?text=Sin+Imagen'"
            />
          </a>

          <p>${item.local}</p>
        `;

        grid.appendChild(card);

      });

    });

  }

  // ==========================
  // START
  // ==========================

  init();

</script>

</body>
</html>
